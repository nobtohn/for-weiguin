<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>For Weiguin 🐧</title>
<link href="https://fonts.googleapis.com/css2?family=Caveat:wght@500;700&family=Nunito:wght@600;800&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  body {
    font-family: 'Nunito', sans-serif;
    background: #fff0f3;
    min-height: 100vh;
    min-height: 100dvh;
    display: flex;
    align-items: center;
    justify-content: center;
    overflow: hidden;
    touch-action: none;
  }
  .hearts-bg { position: fixed; inset: 0; pointer-events: none; z-index: 0; }
  .heart-float {
    position: absolute;
    opacity: 0.12;
    animation: floatUp linear infinite;
  }
  @keyframes floatUp {
    0%   { transform: translateY(110vh); opacity: 0.12; }
    100% { transform: translateY(-10vh); opacity: 0; }
  }
  .page {
    position: relative; z-index: 1;
    display: none; flex-direction: column;
    align-items: center; justify-content: center;
    text-align: center; padding: 1.5rem;
    animation: fadeIn 0.5s ease;
    width: 100%;
  }
  .page.active { display: flex; }
  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(16px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  /* PAGE 1 */
  #page1 .card {
    background: white; border-radius: 2rem;
    padding: 2.5rem 2rem; max-width: 340px; width: 90%;
    box-shadow: 0 20px 60px rgba(255,80,120,0.2);
    cursor: pointer;
    border: 3px solid #ffb3c6;
    user-select: none;
  }
  .tap-hint {
    font-family: 'Caveat', cursive; font-size: 1.8rem;
    color: #e05080;
    animation: pulse 1.5s ease-in-out infinite;
  }
  .subtitle { font-size: 1rem; color: #c08090; margin-top: 0.6rem; }
  @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.35; } }

  /* PAGE 2 */
  #page2 .bubble {
    background: white; border-radius: 2rem;
    padding: 2.5rem 1.5rem 2rem; max-width: 380px; width: 92%;
    box-shadow: 0 20px 60px rgba(255,80,120,0.2);
    border: 3px solid #ffb3c6;
    position: relative;
    /* fixed height so No button can roam freely */
    height: 300px;
    overflow: hidden;
  }
  .question {
    font-family: 'Caveat', cursive; font-size: 2.4rem;
    color: #c0395a; margin-bottom: 1.5rem; line-height: 1.3;
  }
  .btn-yes {
    background: linear-gradient(135deg, #ff6b8a, #e0305a);
    color: white; border: none; border-radius: 50px;
    padding: 0.85rem 2.5rem; font-size: 1.15rem;
    font-family: 'Nunito', sans-serif; font-weight: 800;
    cursor: pointer; box-shadow: 0 6px 20px rgba(224,48,90,0.35);
    position: relative; z-index: 10;
    transition: transform 0.15s;
  }
  .btn-no {
    background: white; color: #aaa; border: 2px solid #ddd;
    border-radius: 50px; padding: 0.75rem 1.8rem; font-size: 1.05rem;
    font-family: 'Nunito', sans-serif; font-weight: 600;
    cursor: pointer;
    position: absolute;
    /* start position */
    bottom: 60px; right: 30px;
    transition: none;
    user-select: none;
    -webkit-user-select: none;
  }
  #plea-msg {
    font-family: 'Caveat', cursive; font-size: 1.45rem;
    color: #e0305a;
    position: absolute; bottom: 14px; left: 0; right: 0;
    text-align: center;
  }

  /* PAGE 3 */
  #page3 .final-card {
    background: white; border-radius: 2rem;
    padding: 2rem 1.5rem; max-width: 400px; width: 92%;
    box-shadow: 0 20px 60px rgba(255,80,120,0.25);
    border: 3px solid #ffb3c6;
    animation: popIn 0.5s cubic-bezier(0.34,1.56,0.64,1);
  }
  @keyframes popIn { from { transform: scale(0.5); opacity: 0; } to { transform: scale(1); opacity: 1; } }
  #page3 img { width: 100%; max-width: 280px; border-radius: 1.2rem; margin: 0.8rem auto; display: block; }
  .final-text { font-family: 'Caveat', cursive; font-size: 2rem; color: #c0395a; line-height: 1.5; margin-top: 0.4rem; }
  .bounce { display: inline-block; animation: bb 1s ease infinite alternate; }
  @keyframes bb { from { transform: rotate(-8deg) scale(1); } to { transform: rotate(8deg) scale(1.2); } }
</style>
</head>
<body>
<div class="hearts-bg" id="heartsBg"></div>

<!-- PAGE 1 -->
<div class="page active" id="page1">
  <div class="card" id="openCard">
    <div class="tap-hint">💌 tap to open 💌</div>
    <div class="subtitle">a message from nobguin</div>
  </div>
</div>

<!-- PAGE 2 -->
<div class="page" id="page2">
  <div class="bubble" id="bubble">
    <div class="question">Will you forgive me? 🥺</div>
    <button class="btn-yes" id="yesBtn">Yes 💕</button>
    <button class="btn-no" id="noBtn">No</button>
    <div id="plea-msg"></div>
  </div>
</div>

<!-- PAGE 3 -->
<div class="page" id="page3">
  <div class="final-card">

<script>
// Floating hearts
const hb = document.getElementById('heartsBg');
['❤️','🩷','💕','🐧','💖','✨'].forEach(e => {
  for (let i = 0; i < 4; i++) {
    const h = document.createElement('div');
    h.className = 'heart-float';
    h.textContent = e;
    h.style.left = Math.random() * 100 + 'vw';
    h.style.animationDuration = (7 + Math.random() * 8) + 's';
    h.style.animationDelay = (Math.random() * 10) + 's';
    h.style.fontSize = (1 + Math.random() * 1.2) + 'rem';
    hb.appendChild(h);
  }
});

function goTo(n) {
  document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
  document.getElementById('page' + n).classList.add('active');
}

document.getElementById('openCard').addEventListener('click', () => goTo(2));
document.getElementById('yesBtn').addEventListener('click', () => goTo(3));

const pleas = [
  "Really? 🥺", "Please... 🙏", "Pleaaase!! 😢",
  "I said please!! 🥺🥺", "Come onnnn!! 💔",
  "Don't do this 😭", "I'll be sad forever 🐧💔",
  "PLEAAAASE 😭😭😭", "I love youuuu!! 🥺❤️",
  "Just say yes!! 🙏💕", "I'm begging you 😭😭",
  "PLEASE PLEASE PLEASE 🥺🥺🥺"
];
let noCount = 0;
const noBtn = document.getElementById('noBtn');
const pleaMsg = document.getElementById('plea-msg');
const bubble = document.getElementById('bubble');

function runAway() {
  noCount++;
  pleaMsg.textContent = pleas[Math.min(noCount - 1, pleas.length - 1)];

  const bW = bubble.offsetWidth;
  const bH = bubble.offsetHeight;
  const nW = noBtn.offsetWidth;
  const nH = noBtn.offsetHeight;

  // random position anywhere inside the bubble, avoiding the top question area
  const x = 10 + Math.random() * (bW - nW - 20);
  const y = 90 + Math.random() * (bH - nH - 110);

  noBtn.style.left = x + 'px';
  noBtn.style.top = y + 'px';
  noBtn.style.right = 'auto';
  noBtn.style.bottom = 'auto';

  // grow yes button
  const scale = Math.min(1 + noCount * 0.05, 1.6);
  document.getElementById('yesBtn').style.transform = 'scale(' + scale + ')';
}

// Works on both mouse AND touch
noBtn.addEventListener('click', runAway);
noBtn.addEventListener('touchstart', function(e) {
  e.preventDefault(); // prevent ghost click
  runAway();
}, { passive: false });

// On desktop, also dodge on hover
noBtn.addEventListener('mouseenter', runAway);
</script>
